services:
  - type: web
    name: pdverp-licencas
    env: python
    buildCommand: pip install -r server_requirements.txt && python server_init_db.py
    startCommand: gunicorn "server_app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      # ── OBRIGATÓRIO: defina estes dois no painel do Render ──────────────
      # Dashboard → pdverp-licencas → Environment → Add Environment Variable
      #
      # HMAC_SECRET   → string longa aleatória. DEVE ser igual ao _HMAC_SECRET
      #                  no arquivo licenca.py do seu PDV local.
      #
      # ADMIN_API_KEY → sua senha do painel web (ex: MinhaChave2026!)
      #                  Anote — vai precisar para logar na Netlify.
      #
      - key: HMAC_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: GRACE_DIAS
        value: "7"
      - key: DB_PATH
        value: "/var/data/licencas.db"

    disk:
      name: licencas-data
      mountPath: /var/data
      sizeGB: 1

    healthCheckPath: /health
